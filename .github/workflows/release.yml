name: Release

# Tag-triggered release. Push a tag matching `v<semver>` (e.g. `v0.5.1`)
# and this workflow will:
#   1. Verify the tag matches `pyproject.toml` `version`
#   2. Run the full test suite on the tagged commit
#   3. Build sdist + wheel with `python -m build`
#   4. Publish to PyPI via PYPI_TOKEN secret
#
# Manual fallback via ``workflow_dispatch``: GitHub Actions does not fire
# downstream workflows when a tag is pushed using the default
# ``GITHUB_TOKEN`` (autotag.yml's case), so this workflow can also be
# triggered by hand. The dispatch takes an explicit ``tag`` input rather
# than relying on the workflow ref dropdown — GitHub's mobile UI does
# not always expose the Tags subsection of that picker, and even on
# desktop the default is "main" which would otherwise package main's
# content instead of the tagged commit. The input is the source of
# truth for which commit gets tested, built, and published; every
# downstream job checks out exactly that tag ref.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.6.0 or 0.6.0). Required for manual runs; ignored on the push-tag trigger."
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag matches pyproject version
    runs-on: ubuntu-latest
    outputs:
      tag_ref: ${{ steps.target.outputs.tag_ref }}
      tag: ${{ steps.target.outputs.tag }}
    steps:
      - name: Resolve target tag
        id: target
        run: |
          # On push:tags, GITHUB_REF is the tag itself. On
          # workflow_dispatch, the input.tag is what we publish — the
          # dispatch always runs from the workflow's home branch
          # (typically main), so GITHUB_REF cannot be trusted.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            # Allow both ``v0.6.0`` and ``0.6.0`` for ergonomics —
            # strip any leading ``v`` once before re-prepending.
            tag="${tag#v}"
            tag_ref="refs/tags/v${tag}"
          else
            tag_ref="${GITHUB_REF}"
            if [[ "$tag_ref" != refs/tags/v* ]]; then
              echo "::error::expected push trigger on refs/tags/v<semver>, got $tag_ref"
              exit 1
            fi
            tag="${tag_ref#refs/tags/v}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::resolved empty tag from $tag_ref / inputs.tag='${{ inputs.tag }}'"
            exit 1
          fi
          echo "tag_ref=$tag_ref" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag $tag (ref $tag_ref)"

      - uses: actions/checkout@v6
        with:
          # Check out the tag explicitly so the pyproject cross-check
          # below reads the file at the released commit, not at HEAD
          # of the workflow_dispatch ref.
          ref: ${{ steps.target.outputs.tag_ref }}

      - name: Check tag vs. pyproject.toml
        run: |
          tag="${{ steps.target.outputs.tag }}"
          pyproject_version=$(
            python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          )
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::tag $tag does not match pyproject version $pyproject_version"
            exit 1
          fi
          echo "tag matches pyproject version: $tag"

  test:
    name: Full test suite on tagged commit
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Same tag everyone else uses. Without this, a
          # workflow_dispatch run would test main's content while
          # claiming to be a release of the tagged version — silent
          # version-content drift on every manual publish.
          ref: ${{ needs.verify.outputs.tag_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install + test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -q

  build:
    name: Build sdist + wheel
    needs: [verify, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
