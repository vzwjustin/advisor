name: Release

# Tag-triggered PyPI publish. Push a tag matching `v<semver>` (e.g.
# `v0.4.0`) and this workflow will:
#   1. Verify the tag matches `pyproject.toml` `version`
#   2. Run the full test suite on the tagged commit
#   3. Build sdist + wheel with `python -m build`
#   4. Publish to PyPI via Trusted Publishing (OIDC — no API token stored)
#
# Setup (one-time): configure the `advisor-agent` PyPI project with a
# Trusted Publisher pointing at this repo + workflow. No secrets needed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag matches pyproject version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check tag vs. pyproject.toml
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pyproject_version=$(
            python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          )
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::tag $tag does not match pyproject version $pyproject_version"
            exit 1
          fi
          echo "tag matches pyproject version: $tag"

  test:
    name: Full test suite on tagged commit
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install + test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -q

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/advisor-agent
    permissions:
      id-token: write  # Required for Trusted Publishing via OIDC
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
